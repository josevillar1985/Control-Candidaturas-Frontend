<div class="search-container">
  <input type="text" placeholder="Buscar empresa, email..." class="search-input" [(ngModel)]="searchText"
    (input)="filterApplications()">
</div>

<table>
  <thead>
    <tr>
      <th>Empresa</th>
      <th>Email</th>
      <th>Estado</th>
      <th>Fecha</th>
      <th>Cambiar Estado</th>
      <th>Eliminar</th>
    </tr>
  </thead>

  <tbody>
    @for (item of applicationService.applications; track $index) {
    <tr>
      <td class="empresa">{{ item.name }}</td>
      <td class="email">{{ item.email }}</td>

      <td>
        <span class="status-btn" [ngClass]="item.status === 'ENVIADO' ? 'enviado' : 'rechazado'">
          {{ item.status }}
        </span>
      </td>

      <td class="date">{{ item.date | date:'dd/MM/yyyy' }}</td>

      <td class="action">
        <button class="btn btn-green" (click)="updateAplication(item)">
          Cambiar
        </button>
      </td>

      <td class="delete">
        <button class="btn btn-red" (click)="deleteApplication(item.id!)">
          Eliminar
        </button>
      </td>
    </tr>
    }
  </tbody>
</table>
